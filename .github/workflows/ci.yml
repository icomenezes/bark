name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build assets
        run: |
          npm ci
          npm run build

      - name: Pull latest code on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            cd /var/www/assinador
            git pull origin main

      - name: Copy build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          source: "public/build"
          target: "/var/www/assinador"

      - name: Finish deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            cd /var/www/assinador
            chown -R www-data:www-data public/build
            sudo -u www-data /usr/bin/php8.3 /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction
            [ -L public/storage ] || sudo -u www-data /usr/bin/php8.3 artisan storage:link
            sudo -u www-data /usr/bin/php8.3 artisan migrate --force
            sudo -u www-data /usr/bin/php8.3 artisan optimize:clear
            sudo -u www-data /usr/bin/php8.3 artisan config:cache
            sudo -u www-data /usr/bin/php8.3 artisan route:cache
            sudo -u www-data /usr/bin/php8.3 artisan view:cache
            systemctl restart assinador-worker
